# config/abm_sim.yaml
# EC Elongation ABM — Simulation Config 

experiment: "abm_simulation"

# -----------------------------------------------------------------------------
# FILES
# -----------------------------------------------------------------------------
files:
  recruitment_csv: "rho_recruitment.csv"

# -----------------------------------------------------------------------------
# SIMULATION — Time integration scheme and run length
# -----------------------------------------------------------------------------
# Overdamped equation: dx = (F_net / gamma) × dt
# Units: lengths in µm, times in minutes, forces in nN.
simulation:
  dt: 0.1
  n_steps: 3000
  viscousity: 3.0 # viscous drag coefficient (overdamped friction)
  max_displacement: 0.5 # per-step displacement clamp (numerical stability)
  detail_log_interval: 100

# -----------------------------------------------------------------------------
# CELL — Initial geometry and discretisation
# -----------------------------------------------------------------------------ß
cell:
  n_nodes: 20
  radius: 12.0 # initial cell radius (µm)
  centroid: [0.0, 0.0] # initial centroid position
  polar_angle: 30 # half-cone angle (degrees) defining polar nodes
  p_area: 0.5 # area-conservation pressure coefficient

# -----------------------------------------------------------------------------
# FLOW — External shear stress 
# -----------------------------------------------------------------------------
flow:
  magnitude: 10.0
  direction: [1.0, 0.0]

# -----------------------------------------------------------------------------
# CORTEX — Cortical spring properties
# -----------------------------------------------------------------------------
cortex:
  a_base: 0.95 # baseline activation (rest length fraction)
  a_drop: 0.3 # RhoA-driven activation decrease capacity

# -----------------------------------------------------------------------------
# STRESS FIBRE — Cable properties
# -----------------------------------------------------------------------------
stress_fibre:
  k_fraction: 0.7 # SF stiffness as fraction of cortex k_base
  a_base: 0.81  # baseline (relaxed at quiescence)
  a_drop: 0.5  # RhoC-driven activation decrease capacity
  nu: 0.3 # Poisson coupling for waist squeeze

# -----------------------------------------------------------------------------
# SHARED MECHANICS — Cross-cutting mechanical parameters
# -----------------------------------------------------------------------------
mechanics:
  k_base: 1.0 #(k_tensile), baseline stiffness & cortex stiffness
  kc_ratio: 0.1 # compression/tension stiffness ratio (bilinear law)
  tau_remodel: 30.0 # first-order relaxation timescale (min)

# -----------------------------------------------------------------------------
# SIGNALLING — Hill function parameters for junction protein recruitment
# -----------------------------------------------------------------------------
hill_params:
  DSP:  {K: 4, n: 5, max: 0.67, knocked_out: false}
  TJP1: {K: 5,  n: 6, max: 0.67, knocked_out: false}
  JCAD: {K: 4,  n: 2, max: 0.67, knocked_out: false}


# -----------------------------------------------------------------------------
# PERTURBATIONS 
# -----------------------------------------------------------------------------
perturbations:
  WT: {}
  DSP_KO:        {DSP:  {knocked_out: true}}
  TJP1_KO:       {TJP1: {knocked_out: true}}
  JCAD_KO:       {JCAD: {knocked_out: true}}
  DSP_JCAD_DKO:  {DSP:  {knocked_out: true}, JCAD: {knocked_out: true}}
  TJP1_JCAD_DKO: {TJP1: {knocked_out: true}, JCAD: {knocked_out: true}}