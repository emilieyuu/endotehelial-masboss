# config/abm_sim.yaml
# EC Elongation ABM — Simulation Config 

experiment: "abm_simulation"


# -----------------------------------------------------------------------------
# FILES
# -----------------------------------------------------------------------------
files:
  recruitment_csv: "param_sweep_Joint_Recr_Sweep.csv"

# -----------------------------------------------------------------------------
# INTEGRATION 
# -----------------------------------------------------------------------------
# Overdamped equation: dx = (F_net / gamma) × dt
# All forces are in pN, lengths in µm, times in minutes.

integration:
  dt: 0.1
  gamma: 3.0
  max_displacement: 0.5
  n_steps: 1500

# -----------------------------------------------------------------------------
# CELL GEOMETRY — Initial cell shape and discretisation
# -----------------------------------------------------------------------------
cell_geometry:
  n_nodes: 16
  radius: 12.0
  init_ar: 1.0
  polar_threshold: 0.866


# -----------------------------------------------------------------------------
# FLOW — External shear stress input
# -----------------------------------------------------------------------------
flow:
  f_magnitude: 10.0
  f_direction: [1.0, 0.0]
  f_drag_fraction: 0.2 # sweep

# -----------------------------------------------------------------------------
# SIGNALLING — Hill function parameters for junction protein recruitment
# -----------------------------------------------------------------------------
hill_params:
  DSP:
    K: 20 #
    n: 3 # 
    p_max: 0.67         # MaBoSS LUT ceiling — fixed
    knocked_out: false   # set true for DSP_KO perturbation

  TJP1:
    K: 8 #5 # f_magnitude/6
    n: 2 # low cooperativity — total shear sensor
    p_max: 0.67 # MaBoSS LUT ceiling — fixed
    knocked_out: false

  JCAD:
    K: 4 #3
    n: 2 # high cooperativity — sharp pole amplifier
    p_max: 0.67         # MaBoSS LUT ceiling — fixed
    knocked_out: false


# -----------------------------------------------------------------------------
# MECHANICS — Cortical springs, stress fibres, focal adhesions, area penalty
# -----------------------------------------------------------------------------
mechanics:
  # --- Cortical spring ---
  k_cortex_base: 1.0 # Baseline for all other stiffness
  k_cortex_range: 2.0
  kc_ratio: 0.1 # From Jakob et al. 
  a_cortex_base: 0.95 # From Jakob et al. 
  a_cortex_range: 0.2

  # --- Stress fibre ---
  k_sf_fraction: 0.7 # From Jakob et al. 
  nu_sf: 0.3 # From Deshpade et al. 
  a_sf_base: 1.0
  a_sf_range: 0.3

  # --- remodelling ---
  tau_remodel: 30.0

  # --- Area conservation ---
  k_area: 1.0

# -----------------------------------------------------------------------------
# PERTURBATIONS — Knockout conditions
# -----------------------------------------------------------------------------

perturbations:
  WT: {}
  DSP_KO:
    DSP: {knocked_out: true}
  TJP1_KO:
    TJP1: {knocked_out: true}
  JCAD_KO:
    JCAD: {knocked_out: true}
  DSP_JCAD_DKO:
    DSP: {knocked_out: true}
    JCAD: {knocked_out: true}
  TJP1_JCAD_DKO:
    TJP1: {knocked_out: true}
    JCAD: {knocked_out: true}