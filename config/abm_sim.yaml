# config/abm_sim.yaml
# EC Elongation ABM — Simulation Config 

experiment: "abm_simulation"


# -----------------------------------------------------------------------------
# FILES
# -----------------------------------------------------------------------------
files:
  recruitment_csv: "param_sweep_Joint_Recr_Sweep.csv"

# -----------------------------------------------------------------------------
# INTEGRATION 
# -----------------------------------------------------------------------------
# Overdamped equation: dx = (F_net / gamma) × dt
# All forces are in pN, lengths in µm, times in minutes.

integration:
  dt: 0.1
  gamma: 3.0
  max_displacement: 0.5
  n_steps: 1500

# -----------------------------------------------------------------------------
# CELL GEOMETRY — Initial cell shape and discretisation
# -----------------------------------------------------------------------------
cell_geometry:
  n_nodes: 16
  radius: 12.0
  init_ar: 1.2
  polar_threshold: 0.866


# -----------------------------------------------------------------------------
# FLOW — External shear stress input
# -----------------------------------------------------------------------------
flow:
  f_magnitude: 20.0
  f_direction: [1.0, 0.0]
  drag_fraction: 0.1 # sweep

# -----------------------------------------------------------------------------
# SIGNALLING — Hill function parameters for junction protein recruitment
# -----------------------------------------------------------------------------
hill_params:
  DSP:
    K_divisor: 1.4  # f_magnitude/4
    n: 3 # moderate cooperativity — tensile junction sensor
    p_max: 0.67         # MaBoSS LUT ceiling — fixed
    knocked_out: false   # set true for DSP_KO perturbation

  TJP1:
    K_divisor: 5 # f_magnitude/6
    n: 2 # low cooperativity — total shear sensor
    p_max: 0.67 # MaBoSS LUT ceiling — fixed
    knocked_out: false

  JCAD:
    K_divisor: 3
    n: 4 # high cooperativity — sharp pole amplifier
    p_max: 0.67         # MaBoSS LUT ceiling — fixed
    knocked_out: false


# -----------------------------------------------------------------------------
# MECHANICS — Cortical springs, stress fibres, focal adhesions, area penalty
# -----------------------------------------------------------------------------
mechanics:
  # --- Cortical spring ---
  k_cortex: 1.0 # Baseline for all other stiffness
  kc_ratio: 0.1
  rhoa_gain: 10.0 # sweep

  # --- Stress fibre ---
  k_sf_fraction: 0.7 #sweep
  nu_sf: 0.6 #sweep
  rhoc_gain: 1.0

  # --- remodelling ---
  tau_remodel: 30.0

  # --- Area conservation ---
  k_area: 0.5

# -----------------------------------------------------------------------------
# PERTURBATIONS — Knockout conditions
# -----------------------------------------------------------------------------

perturbations:
  WT: {}
  DSP_KO:
    DSP: {knocked_out: true}
  TJP1_KO:
    TJP1: {knocked_out: true}
  JCAD_KO:
    JCAD: {knocked_out: true}
  DSP_JCAD_DKO:
    DSP: {knocked_out: true}
    JCAD: {knocked_out: true}
  TJP1_JCAD_DKO:
    TJP1: {knocked_out: true}
    JCAD: {knocked_out: true}