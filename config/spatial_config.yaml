# Config for spatial model aspects

# Protein-Specifc Hill Parameters
hill_params: 
  # K: Half-activation shear
  # n: Cooperativity
  JCAD: {K: 0.4, n: 2}
  DSP: {K: 0.3, n: 2}
  TJP1: {K: 0.3, n: 2}

# Protein-Specific Face bias, scales affective shear by face
face_bias:
  JCAD: {lateral: 1.0, upstream: 0.7, downstream: 0.3} # Recruits well under tension
  DSP: {lateral: 1.0, upstream: 0.2, downstream: 0.1} # Primarily tensile force
  TJP1: {lateral: 0.4, upstream: 1.0, downstream: 0.2} # Responds to upstream loading
  