# Config for spatial model aspects

# Lookup Table Configuration
files: 
  recruitment_csv: "param_sweep_Joint_Recr_Sweep.csv"

sim: 
  dt: 0.1
  gamma: 3.0 # viscuous drag on each mode (higher ≈ slower movement)
    # At gamma = 1.0, k_cortex = 1.0, a force of 1.0 moves a node by 0.1 units per step.


# Protein-Specifc Hill Parameters
hill_params: # Maps to protein recruitment
  DSP: {K: 0.05, n: 3, p_max: 0.67, knocked_out: False}
  TJP1: {K: 0.03, n: 2, p_max: 0.67, knocked_out: False}
  JCAD: {K: 0.04, n: 4, p_max: 0.67, knocked_out: False}

# Parameter for tension calculation
mechanics:
  # --- Cortical spring ---
  k_cortex: 1.0 # Reference stiffness
  kc_ratio: 0.1 # Compressive stiffness = 0.1 of tensile
  rhoa_k_gain: 10.0 #RhoA above baseline can raise k_active to (1 + 8.0 * delta_rhoA) * k_cortex.
    # At full activation (delta_rhoA = 0.207): k_active = 2.5 * k_cortex.

  # --- Stress fibre ---
  k_sf_fraction: 0.4 # Stress fibre stiffness = 40% of k_cortex.
  rhoc_l_shrink: 1.5 # Maximum fractional shortening of L_sf under full RhoC activation
  rhoc_max_shrink: 0.35 # Absolute cap on L_sf reduction.

  # --- Shared remodelling ---
  tau_remodel: 30.0 # Time constant for both cortex and fibre remodelling.
  # alpha = dt / tau = 0.1 / 100 = 0.001 per step.
  # At this rate, 63% remodelling takes 100 steps, 95% takes ~300 steps.

  # --- Area conservation ---
  k_area: 0.3
  # Soft constraint. At k_area = 1.5 and k_cortex = 1.0, area changes
  # of ~10% generate restoring pressure comparable to spring forces.

  # --- Anchoring Force ---
  k_anchor: 0.3
  # Focal adhesion anchoring stiffness.
  # 5% of k_cortex — resists translation, allows shape change.


 

  