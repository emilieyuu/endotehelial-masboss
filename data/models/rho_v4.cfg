// rho_v4.cfg
// Rho-Junction Model Config Version 4.
// 

// --- Junction Protein Recruitment Rates ---
$DSP_recruitment  = 1.0;   // overridden by Hill(tau, face)
$DSP_decruitment  = 0.5;   // rate of losing recruitment when force drops

$TJP1_recruitment = 1.0;
$TJP1_decruitment = 0.5;

$JCAD_recruitment = 1.0;
$JCAD_decruitment = 0.5;

// --- RhoA / RhoC Activation and Deactivation Rates ---
$RhoA_amp = 10.0;          // frequent activation when JCAD
$RhoA_mod = 1.2;           // frequent but weaker activation
$RhoA_basal = 0.5;         // rare spontaneous activation

$RhoA_antagonistic = 3.0;  // competition accelerates shutoff
$RhoA_decay = 0.2;         // intrinsic self-inactivation

$RhoC_amp = 10.0;          // frequent activation when JCAD
$RhoC_mod = 1.2;           // frequent but weaker activation
$RhoC_basal = 0.5;         // rare spontaneous activation

$RhoC_antagonistic = 3.0;  // competition accelerates shutoff
$RhoC_decay = 0.2;         // intrinsic self-inactivation


// --- Initial States (istate) ---
DSP.istate = 1.0;    
TJP1.istate = 1.0;
JCAD.istate = 1.0;

RhoA.istate = 0.0;   
RhoC.istate = 0.0;


// --- Simulation Control ---
max_time = 20.0;       // Must be > inverse of smallest rate (1/0.2 = 5)
time_tick = 0.1;       // Window for probability estimates
sample_count = 5000;   // Number of stochastic trajectories